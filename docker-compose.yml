
services:
  mongodb:
    image: mongo:8
    container_name: spmp_mongodb
    restart: always
    entrypoint: ["/bin/bash", "/setup.sh"]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: spmp
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init/setup.sh:/setup.sh
    healthcheck:
      test: ["CMD-SHELL", "mongosh -u admin -p password123 --authenticationDatabase admin --eval \"db.adminCommand('ping')\" --quiet"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s
  server:
    build:
      context: ./server
    container_name: spmp_server
    restart: always
    ports:
      - "3000:3000"
    depends_on:
       mongodb:
        condition: service_healthy
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
    container_name: spmp_client
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - server
    stdin_open: true
    tty: true

  mongo-express:
    image: mongo-express
    container_name: spmp_mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_BASICAUTH: "false"
      ME_CONFIG_MONGODB_URL: mongodb://admin:password123@mongodb:27017/
      ME_CONFIG_SITE_BASEURL: "/db/"

    depends_on:
      - mongodb

volumes:
  mongodb_data:
